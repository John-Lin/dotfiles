name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Lua
      uses: leafo/gh-actions-lua@v10
      with:
        luaVersion: "5.4"

    - name: Set up LuaRocks
      uses: leafo/gh-actions-luarocks@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y stow jq jsonnet
        # Install luacheck via luarocks (requires Lua setup first)
        luarocks install luacheck

    - name: Run syntax check
      run: make check-syntax

    - name: Run linter
      run: make lint

    - name: Run sync smoke tests
      run: make test-sync-smoke

    - name: Run safety regression tests
      run: make test-safety

    - name: Test Neovim stow functionality
      run: |
        # Test that stow commands work for Neovim
        make sync-neovim
        make clean-neovim

    - name: Check Lua formatting
      run: |
        # Download and run stylua for format checking
        wget -q https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip
        unzip -q stylua-linux-x86_64.zip
        chmod +x stylua
        ./stylua --check nvim/.config/nvim/
